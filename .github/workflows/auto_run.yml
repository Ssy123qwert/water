# 工作流名称（自定义）
name: 定时执行Python脚本

# 触发条件：定时执行 + 手动触发（方便测试）
on:
  # 定时规则（cron 表达式，UTC 时间，北京时间=UTC+8）
  schedule:
    - cron: '0 12 * * *'  # 对应北京时间 20:00（12+8=20）
  # 手动触发开关（测试用）
  workflow_dispatch:

# 执行任务
jobs:
  run-script:
    # 运行环境（选 Ubuntu 最新版即可）
    runs-on: ubuntu-latest
    steps:
      # 步骤 1：拉取仓库代码到运行环境
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 步骤 2：配置 Python 环境
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # 匹配你的脚本Python版本

      # 步骤 3：安装脚本依赖
      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # 如果没有requirements.txt，可删除这行

      # 步骤 4：执行 Python 脚本
      - name: 运行Python脚本
        # 传递Secrets（如果有）+ 执行脚本
        env:
          # 从仓库Secrets读取敏感信息（比如账号密码）
        run: |
          python main.py  # 你的脚本文件名
